<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>고스트대시</title>
    <!-- 폰트: Fredoka(영문 HUD) + Bangers(영문 임팩트) + Black Han Sans(한글 임팩트) -->
    <!-- 한글 본문 물마루는 style.css @font-face (../assets/fonts/Mulmaru.woff2) — 부트 CSS도 동일 스택 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Black+Han+Sans&family=Fredoka:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- 부트 로딩: JS/CSS 도착 전에도 보이도록 인라인. 저사양에서 Phaser 부트 10초+ 대비. -->
    <!-- 폰트 스택은 GameScene FONT_IMPACT / FONT_KR 과 동일 — 로딩↔인게임 이질감 방지. -->
    <style>
      #boot-loading {
        position: fixed;
        inset: 0;
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a2e;
        color: #e8e0ff;
        font-family: "Mulmaru", "Fredoka", "Apple SD Gothic Neo", sans-serif;
        transition: opacity 0.25s ease;
      }
      #boot-loading.boot-loading--hide {
        opacity: 0;
        pointer-events: none;
      }
      .boot-loading-inner {
        text-align: center;
        padding: 24px;
      }
      .boot-loading-spinner {
        width: 36px;
        height: 36px;
        margin: 0 auto 18px;
        border: 3px solid rgba(94, 252, 232, 0.2);
        border-top-color: #5efce8;
        border-radius: 50%;
        animation: boot-spin 0.75s linear infinite;
      }
      .boot-loading-title {
        margin: 0 0 8px;
        font-family: "Bangers", "Black Han Sans", cursive;
        font-size: 28px;
        font-weight: 400;
        letter-spacing: 0.06em;
        color: #f0f838;
      }
      .boot-loading-status {
        margin: 0;
        font-family: "Mulmaru", "Fredoka", "Apple SD Gothic Neo", sans-serif;
        font-size: 14px;
        opacity: 0.85;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Phaser parent: 뷰포트 전체 + 하늘 톤 — FIT 여백이 검은 띠로 안 보이게 -->
    <div id="game-root"></div>
    <div id="boot-loading" aria-live="polite" aria-busy="true">
      <div class="boot-loading-inner">
        <div class="boot-loading-spinner" aria-hidden="true"></div>
        <p class="boot-loading-title">Ghost Dash</p>
        <p class="boot-loading-status" id="boot-loading-status">로딩 중…</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
